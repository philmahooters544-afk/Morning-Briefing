name: morning-briefing-data

on:
  schedule:
    # 04:30 UTC daily — a buffer before the 07:00 Europe/Berlin briefing,
    # so the packs are ready year-round regardless of DST (GitHub cron is UTC).
    - cron: '30 4 * * *'
  workflow_dispatch: {}   # "Run workflow" button for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Build data pack
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python fetch_data.py

      - name: Build inbox pack
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_inbox.py

      - name: Commit packs
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data-pack.md inbox-pack.md
          git commit -m "packs $(date -u +%F)" || echo "no changes"
          git push
